version: "3.8"

services:
  coturn:
    image: coturn/coturn
    container_name: coturn-dn42
    restart: unless-stopped
    networks:
      - dn42-net

networks:
  dn42-net:
    driver: bridge
    enable_ipv4: false
    enable_ipv6: true
    ipam:
      config:
        - subnet: ${RFC5375_RANDOMIZED_ULA}
