name: webrtc-chat
networks:
  # use for communication between web-proxy and backend server
  webrtc-internal:
    name: "webrtc-internal"
    driver: bridge
    enable_ipv4: false
    enable_ipv6: true
  # use for communication between client-1 and web-proxy
  webrtc-client-1:
    name: "webrtc-client-1"
    driver: bridge
    enable_ipv4: false
    enable_ipv6: true
  # use for communication between client-2 and web-proxy
  webrtc-client-2:
    name: "webrtc-client-2"
    driver: bridge
    enable_ipv4: false
    enable_ipv6: true
  # use for communication between client-3 (agents) and web-proxy
  webrtc-client-3:
    name: "webrtc-client-3"
    driver: bridge
    enable_ipv4: false
    enable_ipv6: true
services:
  webtop1:
    image: lscr.io/linuxserver/webtop:debian-kde
    container_name: webtop1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - PIXELFLUX_WAYLAND=true
    networks:
      - webrtc-client-1
      - webrtc-client-3
    volumes:
      - "./webtop-config1:/config"
      # - "./resolv.conf:/etc/resolv.conf"
      - "./deb-source-overrides.sources:/etc/apt/sources.list.d/debian.sources:ro"
      # note: you still have to run `sudo update-ca-certificates` after start up
      - "./custom-ca/ca.pem:/usr/local/share/ca-certificates/ca.crt:ro"
    ports:
      - "[::1]:13001:3001"
    shm_size: "1gb"
    restart: unless-stopped
  webtop2:
    image: lscr.io/linuxserver/webtop:debian-kde
    container_name: webtop2
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - PIXELFLUX_WAYLAND=true
    networks:
      - webrtc-client-2
      - webrtc-client-3
    volumes:
      - "./webtop-config2:/config"
      # - "./resolv.conf:/etc/resolv.conf"
      - "./deb-source-overrides.sources:/etc/apt/sources.list.d/debian.sources:ro"
      # note: you still have to run `sudo update-ca-certificates` after start up
      - "./custom-ca/ca.pem:/usr/local/share/ca-certificates/ca.crt:ro"
    ports:
      - "[::1]:13002:3001"
    shm_size: "1gb"
    restart: unless-stopped
  stun:
    container_name: webrtc-stun
    hostname: ${STUN_HOSTNAME}
    image: coturn/coturn:latest
    pull_policy: never
    networks:
      - "webrtc-client-1"
      - "webrtc-client-2"
      - "webrtc-client-3"

  agents:
    container_name: webrtc-agents
    image: webrtc-agents:latest
    build:
      context: "./../../../"
      dockerfile: "webrtc-agents/Dockerfile"
    pull_policy: never
    networks:
      - "webrtc-client-3"
    volumes:
      - "./custom-ca/ca.pem:/custom-ca/ca.pem:ro"
      - "./.env:/app/.env:ro"
    working_dir: /app
    command:
      - "--chatbot-model=deepseek/deepseek-v3.2"
      - "--ws-server=wss://${MAIN_DOMAIN}/api/ws"
      - "--ice-server=stun:webrtc-stun:3478"
      - "--reconnect-on-disconnect"
      - "--reconnect-delay=3s"
      - "--openrouter-apikey-env=OPENROUTER_APIKEY"
      - "--custom-ca=/custom-ca/ca.pem"
      - "--prefer-ipv6=true"

  server:
    container_name: webrtc-server
    hostname: webrtc-internal
    build:
      context: "./../../../webrtc-server"
    image: webrtc-server:latest
    pull_policy: never
    volumes:
      - "./.env:/app/.env:ro"
      - "./kioubit-login-pubkey.pem:/app/kioubit-login-pubkey.pem"
    command:
      - "--allowed-origin=https://${MAIN_DOMAIN}"
      - "--github-login-redir-url=http://${MAIN_DOMAIN}/api/github/login/auth"
      - "--kioubit-login-redir-url=http://${MAIN_DOMAIN}/api/kioubit/login/auth"
      - "--login-success-redir-url=http://${MAIN_DOMAIN}/"
      - "--kioubit-login-pubkey=./kioubit-login-pubkey.pem"
      - "--debug=true"
    networks:
      - "webrtc-internal"
  web:
    container_name: webrtc-web
    hostname: ${MAIN_DOMAIN}
    image: webrtc-chat:latest
    restart: unless-stopped
    pull_policy: never
    volumes:
      - "./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro"
      - "./cert.pem:/etc/nginx/certs/cert.pem:ro"
      - "./cert-key.pem:/etc/nginx/certs/cert-key.pem:ro"
    networks:
      - "webrtc-internal"
      - "webrtc-client-1"
      - "webrtc-client-2"
      - "webrtc-client-3"
